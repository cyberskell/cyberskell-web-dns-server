<VirtualHost *:80>
    ServerAdmin ehas2026@gmail.com
    ServerName cyberskell.com
    ServerAlias www.cyberskell.com
    DocumentRoot /var/www/cyberskell.com
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    <Directory /var/www/cyberskell.com>
        Require ip 192.168.1.0/24
    </Directory>
</VirtualHost>

<VirtualHost *:443>
    ServerAdmin ehas2026@gmail.com
    ServerName cyberskell.com
    DocumentRoot /var/www/cyberskell.com
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/cyberskell.com.crt
    SSLCertificateKeyFile /etc/ssl/private/cyberskell.com.key
</VirtualHost>
